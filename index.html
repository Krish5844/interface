<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOID AI Interface</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="scanlines"></div>
    </div>

    <button
      id="mobileSidebarToggle"
      type="button"
      class="mobile-sidebar-toggle icon-btn"
      aria-label="Toggle sidebar"
      title="Toggle sidebar"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="layout">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-inner">
          <div class="sidebar-top">
            <button id="sidebarToggle" class="icon-btn" type="button" aria-label="Toggle sidebar" title="Toggle sidebar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="brand-mini" aria-hidden="true">
              <span class="brand-mark">VOID</span>
            </div>
          </div>

          <button id="newChatBtn" class="new-chat" type="button">
            <span class="plus" aria-hidden="true">+</span>
            <span class="new-chat-text">New chat</span>
          </button>

          <div class="sidebar-section">
            <div class="sidebar-section-title">History</div>
            <div class="sidebar-search">
              <input
                id="historySearch"
                type="text"
                placeholder="Search chats..."
                aria-label="Search chat history"
              />
            </div>
            <ul id="historyList" class="history-list" aria-label="Chat history list"></ul>
          </div>
        </div>
      </aside>

      <main class="main" role="main">
        <section class="hero">
          <div class="hero-inner">
            <h1 class="void-title" id="voidTitle" aria-label="VOID">
              <span class="void-char" style="--void-i: 0" aria-hidden="true">V</span>
              <span class="void-char" style="--void-i: 1" aria-hidden="true">O</span>
              <span class="void-char" style="--void-i: 2" aria-hidden="true">I</span>
              <span class="void-char" style="--void-i: 3" aria-hidden="true">D</span>
            </h1>
            <p class="hero-subtitle">Ready to create along you</p>
          </div>
        </section>

        <section class="chat-section">
          <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
        </section>

        <footer class="composer-bar glass">
          <div class="composer-bar-inner">
            <button
              id="attachBtn"
              type="button"
              class="icon-btn"
              aria-label="Upload image or file"
              title="Upload image or file"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12.5 8.5l-5 5a4 4 0 105.7 5.6l6.2-6.2a6 6 0 10-8.5-8.5L4 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>

            <button id="addBtn" type="button" class="icon-btn add-btn" aria-label="Add">
              +
            </button>

            <input id="fileInput" type="file" accept="image/*,.pdf,.txt,.doc,.docx" hidden />

            <input
              id="bottomInput"
              class="bottom-input"
              type="text"
              placeholder="Message VOID..."
              autocomplete="off"
            />

            <button id="sendBtn" type="button" class="send-btn" aria-label="Send message">
              Send
              <span class="send-arrow" aria-hidden="true">→</span>
            </button>
          </div>

          <div id="attachmentChipBottom" class="attachment-chip" hidden></div>
        </footer>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
